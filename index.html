<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Giveaway | Premium Electric Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.7s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Pulse Animation - Updated to Blue */
        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px 0 rgba(37, 99, 235, 0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-[#f8fafc] pb-24 font-sans text-slate-900">

    <div id="loader" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[9999] flex flex-col items-center justify-center hidden">
        <div class="w-14 h-14 border-4 border-slate-700 border-t-blue-500 rounded-full animate-spin-slow"></div>
        <p class="mt-4 font-medium text-blue-400 tracking-widest animate-pulse uppercase text-[10px]">Establishing Secure Connection...</p>
    </div>

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase">
                Tesla<span class="text-blue-600">Giveaway</span>
            </h1>
            
            <div class="flex items-center gap-4">
                <a href="profile.html" class="nav-link text-xs font-bold text-slate-600 hover:text-blue-600 transition uppercase tracking-wider">Log In</a>
                <a href="profile.html" class="nav-link text-xs font-bold bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200 uppercase tracking-wider">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div class="border-l-4 border-blue-600 pl-6">
                <h2 class="text-4xl font-black text-slate-900 tracking-tight">Current Inventory</h2>
                <p class="text-sm font-medium text-slate-500 mt-1">Exclusive high-performance rewards available now.</p>
            </div>
            <div class="flex items-center gap-3 bg-blue-50 px-4 py-2 rounded-full">
                <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span>
                <p class="text-[10px] font-bold text-blue-700 uppercase tracking-widest">50 Slots Remaining</p>
            </div>
        </div>
        
        <div id="tesla-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 py-4 flex justify-around text-[10px] font-bold shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
        <a href="index.html" class="nav-link text-blue-600 flex flex-col items-center gap-1">
            <span class="text-2xl">🏠</span>
            <span class="tracking-widest uppercase">Showroom</span>
        </a>
        <a href="profile.html" class="nav-link text-slate-400 flex flex-col items-center gap-1 hover:text-blue-400 transition">
            <span class="text-2xl">👤</span>
            <span class="tracking-widest uppercase">My Profile</span>
        </a>
    </footer>

    <script>
        // --- 1. THE 3-SECOND LOADER LOGIC ---
        function startLoading(targetUrl) {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 3000); 
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                startLoading(this.getAttribute('href'));
            });
        });

        // --- 2. UNIQUE IMAGE & GRID LOGIC ---
        const grid = document.getElementById('tesla-grid');
        
        const teslaIds = [
            "1617788138017-80ad40651399", "1560958089-b8a1929cea89", "1619767886558-efdc259cde1a",
            "1620891549027-942fdc95d3f5", "1536700503339-1e4b06520771", "1605816416998-df87ee13db48",
            "1571127236794-81c0bbfe1ce3", "1612810806563-4cb8265db71f", "1541443131876-44b03de101c5",
            "1529369623266-f52646420317", "1601111005295-888995333177", "1617718295766-0f839c2853e7"
        ];

        const models = ["Model S Plaid", "Cybertruck", "Model 3 Performance", "Model X", "Roadster", "Model Y"];

        for (let i = 1; i <= 50; i++) {
            const randomModel = models[Math.floor(Math.random() * models.length)];
            const baseId = teslaIds[i % teslaIds.length];
            const finalImg = `https://images.unsplash.com/photo-${baseId}?auto=format&fit=crop&w=800&q=80&sig=${i}`;

            const card = document.createElement('div');
            card.className = "reveal bg-white rounded-2xl overflow-hidden border border-slate-200 hover:border-blue-300 transition-all duration-300 shadow-sm hover:shadow-xl group";
            card.innerHTML = `
                <div class="h-56 relative overflow-hidden">
                    <img src="${finalImg}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Tesla Giveaway">
                    <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur text-[9px] font-bold px-3 py-1.5 rounded text-white uppercase tracking-widest">Available</div>
                </div>
                <div class="p-6">
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-tight mb-1">${randomModel}</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-4">MSRP: $102,990</p>
                    
                    <div class="flex items-center justify-between py-4 border-t border-slate-100">
                        <div>
                            <span class="text-2xl font-black text-blue-600">$0.00</span>
                        </div>
                        <button onclick="startLoading('profile.html')" class="bg-slate-900 text-white px-5 py-2.5 rounded-lg font-bold text-[10px] uppercase tracking-widest hover:bg-blue-600 transition-colors pulse-blue">
                            Claim Reward
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        // --- 3. SCROLL REVEAL LOGIC ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
