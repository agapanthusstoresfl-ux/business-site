<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaWin | Exclusive Tesla Showroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.7s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Pulse Animation for Buttons */
        .pulse-orange { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Spinner Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <div id="loader" class="fixed inset-0 bg-white z-[9999] flex flex-col items-center justify-center hidden">
        <div class="w-14 h-14 border-4 border-gray-100 border-t-orange-600 rounded-full animate-spin-slow shadow-sm"></div>
        <p class="mt-4 font-black text-gray-800 tracking-tight animate-pulse uppercase text-xs">Connecting to Tesla Servers...</p>
    </div>

    <nav class="sticky top-0 z-50 bg-white border-b px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <h1 class="text-2xl font-black text-orange-600 italic tracking-tighter">MegaWin</h1>
            
            <div class="flex items-center gap-3">
                <a href="profile.html" class="nav-link text-sm font-bold text-gray-700 hover:text-orange-600 transition">Log In</a>
                <a href="profile.html" class="nav-link text-sm font-bold bg-black text-white px-5 py-2 rounded-full hover:bg-gray-800 transition shadow-lg">Sign Up</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-6">
        <div class="mb-8">
            <h2 class="text-3xl font-black text-gray-900 tracking-tight">Tesla Inventory</h2>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Live: 50 Units Available</p>
            </div>
        </div>
        
        <div id="tesla-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
            </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t py-4 flex justify-around text-[10px] font-bold shadow-2xl z-50">
        <a href="index.html" class="nav-link text-orange-600 flex flex-col items-center">
            <span class="text-2xl mb-1">🏠</span>
            <span>Home</span>
        </a>
        <a href="profile.html" class="nav-link text-gray-400 flex flex-col items-center">
            <span class="text-2xl mb-1">👤</span>
            <span>Account</span>
        </a>
    </footer>

    <script>
        // --- 1. THE 3-SECOND LOADER LOGIC ---
        function startLoading(targetUrl) {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 3000); // 3 Seconds exactly
        }

        // Intercept all link clicks
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const url = this.getAttribute('href');
                startLoading(url);
            });
        });


        // --- 2. UNIQUE IMAGE & GRID LOGIC ---
        const grid = document.getElementById('tesla-grid');
        
        // High-quality unique Tesla IDs from Unsplash
        const teslaIds = [
            "1617788138017-80ad40651399", "1560958089-b8a1929cea89", "1619767886558-efdc259cde1a",
            "1620891549027-942fdc95d3f5", "1536700503339-1e4b06520771", "1605816416998-df87ee13db48",
            "1571127236794-81c0bbfe1ce3", "1612810806563-4cb8265db71f", "1541443131876-44b03de101c5",
            "1529369623266-f52646420317", "1601111005295-888995333177", "1617718295766-0f839c2853e7",
            "1519750157634-b6d493a0f77c", "1492144534655-ae79c964c9d7", "1503376780353-7e6692767b70"
        ];

        const models = ["Model S Plaid", "Cybertruck", "Model 3 LR", "Model X Plaid", "Roadster Concept", "Model Y Performance"];

        for (let i = 1; i <= 50; i++) {
            const randomModel = models[Math.floor(Math.random() * models.length)];
            
            // To ensure 100% uniqueness:
            // We use a specific ID, but add a random seed 'sig' to force a fresh variation from the API
            const baseId = teslaIds[i % teslaIds.length];
            const finalImg = `https://images.unsplash.com/photo-${baseId}?auto=format&fit=crop&w=600&q=80&sig=${i}`;

            const card = document.createElement('div');
            card.className = "reveal bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100";
            card.innerHTML = `
                <div class="h-48 md:h-64 relative bg-gray-200">
                    <img src="${finalImg}" class="w-full h-full object-cover" alt="Tesla">
                    <div class="absolute top-3 right-3 bg-white/90 backdrop-blur text-[8px] font-black px-2 py-1 rounded-full text-orange-600 shadow-sm uppercase tracking-tighter">VIP Giveaway</div>
                </div>
                <div class="p-4">
                    <p class="text-xs font-black text-gray-900 truncate uppercase tracking-tight">${randomModel} #${100 + i}</p>
                    <div class="flex items-baseline gap-2 mt-1">
                        <span class="text-xl font-black text-orange-600">$0.00</span>
                        <span class="text-[10px] text-gray-400 line-through font-bold">$96,500</span>
                    </div>
                    <button onclick="startLoading('profile.html')" class="w-full mt-4 bg-orange-600 text-white py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-orange-100 pulse-orange">
                        Claim My Tesla
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        // --- 3. SCROLL REVEAL LOGIC ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
